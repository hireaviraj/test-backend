name: vychron-build-push-eks

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 767397870266.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: [{"name": "test-backend", "path": "test-backend", "ecr_repository": "kghfgkgkjh/test-backend"}]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767397870266:role/kghfgkgkjh-eks-github-ecr-969a5fdf
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          IMAGE_REPO=$ECR_REGISTRY/${{ matrix.ecr_repository }}
          IMAGE_URI=$IMAGE_REPO:$IMAGE_TAG
          LATEST_URI=$IMAGE_REPO:latest
          if [ -f "${{ matrix.path }}/Dockerfile" ]; then
            DOCKERFILE="${{ matrix.path }}/Dockerfile"
          elif [ -f Dockerfile ]; then
            DOCKERFILE="Dockerfile"
          else
            echo "No Dockerfile found at repo root or ${{ matrix.path }}/Dockerfile" >&2
            exit 1
          fi
          docker build -f "$DOCKERFILE" -t "$IMAGE_URI" -t "$LATEST_URI" .
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
